<div class="container-fluid">
  <app-page-title title="Notes" [breadcrumbItems]="breadCrumbItems"></app-page-title>

  <div class="row">
    <div class="col-lg-12">
      <div class="card">
        <div class="card-body">
          <h4 class="card-title mb-4">Workspace Notes</h4>
          <p class="card-title-desc">Use this editor to jot down ideas, plans, and documentation just like Notion.</p>

          <app-editorjs 
            [data]="editorData" 
            (dataChange)="onEditorDataChange($event)">
          </app-editorjs>
        </div>
      </div>
    </div>
  </div>
</div>
