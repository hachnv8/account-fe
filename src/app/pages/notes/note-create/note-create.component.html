<div class="note-create-wrapper">
  <!-- Top Action Bar -->
  <div class="note-action-bar">
    <div class="d-flex align-items-center">
      <button class="btn btn-link text-muted p-0 me-3" (click)="goBack()" title="Back to Notes">
        <i class="mdi mdi-arrow-left font-size-18"></i>
      </button>
      <div class="d-flex flex-column">
        <span class="text-muted font-size-12">
          @if(lastSavedAt) {
            Saved at {{ lastSavedAt | date:'shortTime' }}
          } @else {
            Draft
          }
        </span>
      </div>
    </div>
    <div class="d-flex gap-2">
      <button class="btn btn-primary btn-sm btn-rounded px-3" (click)="openSaveModal()" [disabled]="isSaving || !noteTitle.trim()">
        @if(isSaving) {
          <i class="bx bx-loader bx-spin me-1"></i> Saving
        } @else {
          <i class="mdi mdi-check-all me-1"></i> Save
        }
      </button>
    </div>
  </div>

  <!-- Note Editor Container -->
  <div class="note-editor-container">
    <div class="note-editor-content">
      
      <!-- Optional Cover/Icon Area Simulation -->
      <!-- <div class="note-cover pt-4 pb-2">
        <button class="btn btn-light btn-sm rounded-pill"><i class="mdi mdi-image-outline me-1"></i> Add Cover</button>
        <button class="btn btn-light btn-sm rounded-pill ms-2"><i class="mdi mdi-emoticon-outline me-1"></i> Add Icon</button>
      </div> -->

      <div class="note-title-wrapper mt-4">
        <input 
          type="text" 
          class="note-title-input" 
          placeholder="Untitled Note" 
          [(ngModel)]="noteTitle"
          autocomplete="off">
      </div>

      <!-- Editor Actions -->
      <div class="editor-actions mt-3 mb-2 d-flex gap-2">
        <button class="btn btn-light btn-sm" (click)="uploadFile('image')" title="Insert Image">
          <i class="mdi mdi-image-outline font-size-16 me-1"></i> Photo
        </button>
        <button class="btn btn-light btn-sm" (click)="uploadFile('file')" title="Attach File">
          <i class="mdi mdi-paperclip font-size-16 me-1"></i> File
        </button>
        <input type="file" #fileInput (change)="onFileSelected($event)" style="display: none;">
      </div>

      <div class="ngx-editor-wrapper mt-2" (paste)="onPaste($event)">
        <ngx-editor-menu [editor]="editor" [toolbar]="toolbar"></ngx-editor-menu>
        <ngx-editor [editor]="editor" [(ngModel)]="html" [placeholder]="'Type here...'"></ngx-editor>
      </div>

      <!-- Attachments List -->
      <div class="attachments-section mt-4" *ngIf="attachments.length > 0">
        <h6 class="font-size-14 mb-3">Attachments</h6>
        <div class="row">
          <div class="col-xl-4 col-sm-6" *ngFor="let file of attachments; let i = index">
            <div class="card p-2 border shadow-none mb-3">
              <div class="d-flex align-items-center">
                <div class="avatar-sm me-3">
                  <div class="avatar-title bg-light text-primary rounded font-size-20">
                    <i class="mdi mdi-file-document-outline"></i>
                  </div>
                </div>
                <div class="flex-grow-1 overflow-hidden">
                  <h5 class="font-size-13 mb-1 text-truncate">{{ file.name }}</h5>
                  <p class="text-muted font-size-12 mb-0">{{ file.size }}</p>
                </div>
                <div class="ms-2">
                  <button class="btn btn-link text-danger p-0" (click)="removeAttachment(i)">
                    <i class="mdi mdi-close font-size-16"></i>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      
    </div>
  </div>
</div>

<!-- Save Note Modal -->
<div bsModal #saveNoteModal="bs-modal" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true" [config]="{backdrop: 'static'}">
  <div class="modal-dialog modal-dialog-centered modal-sm">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Save Note</h5>
        <button type="button" class="btn-close" (click)="saveNoteModal.hide()"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label text-muted fw-semibold">Project</label>
          <select class="form-select" [(ngModel)]="selectedProject">
            <option value="General">General</option>
            <option *ngFor="let p of projects" [value]="p.name">{{ p.name }}</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label text-muted fw-semibold">Task</label>
          <select class="form-select" [(ngModel)]="selectedTaskId">
            <option [ngValue]="null">Select Task (Optional)</option>
            <option *ngFor="let t of tasks" [ngValue]="t.id">{{ t.title }}</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="saveNoteModal.hide()" [disabled]="isSaving">Cancel</button>
        <button type="button" class="btn btn-primary" (click)="executeSave()" [disabled]="isSaving">
          @if(isSaving) {
            <i class="bx bx-loader bx-spin me-1"></i> Saving...
          } @else {
            <i class="mdi mdi-check-all me-1"></i> Confirm
          }
        </button>
      </div>
    </div>
  </div>
</div>
